name: tipdrop

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tipdrop
      POSTGRES_PASSWORD: tipdrop
      POSTGRES_DB: tipdrop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tipdrop -d tipdrop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: tipdrop
      RABBITMQ_DEFAULT_PASS: tipdrop
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tipdrop
      MINIO_ROOT_PASSWORD: tipdrop-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_BUCKET: tipdrop-local
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: tipdrop
      MINIO_ROOT_PASSWORD: tipdrop-secret
    volumes:
      - ./minio/create-bucket.sh:/create-bucket.sh:ro
    entrypoint: ["/bin/sh", "/create-bucket.sh"]

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
